                            <div class="flex flex-col items-center">
                                <div class="mx-auto w-52 flex justify-center relative"><div class="flex items-center justify-center text-center font-bold text-sm md:text-base border-2 shadow-sm px-4 py-2 w-48 bg-blue-50 border-blue-300 text-blue-800 transform skew-x-[-15deg]"><span class="transform skew-x-[15deg] block">Read x</span></div></div>
                                <div class="flex flex-col items-center my-1"><div class="w-0.5 h-6 bg-gray-400"></div><i data-lucide="arrow-down" class="text-gray-400 w-4 h-4 -mt-1"></i></div>
                                <div class="flex items-center justify-center text-center font-bold text-sm md:text-base border-2 shadow-sm px-4 py-2 w-48 rounded bg-green-50 border-green-300 text-green-800">Prod = Prod * x</div>
                                <div class="flex flex-col items-center my-1"><div class="w-0.5 h-6 bg-gray-400"></div><i data-lucide="arrow-down" class="text-gray-400 w-4 h-4 -mt-1"></i></div>
                                <div class="flex items-center justify-center text-center font-bold text-sm md:text-base border-2 shadow-sm px-4 py-2 w-48 rounded bg-green-50 border-green-300 text-green-800">C = C + 1</div>
                                <div class="flex flex-col items-center my-1"><div class="w-0.5 h-6 bg-gray-400"></div><i data-lucide="arrow-down" class="text-gray-400 w-4 h-4 -mt-1"></i></div>
                                <div class="mx-auto w-32 h-32 relative my-4 flex items-center justify-center"><div class="absolute inset-0 bg-yellow-50 border-2 border-yellow-400 transform rotate-45 shadow-sm"></div><div class="relative z-10 font-bold text-yellow-900 text-sm text-center px-2">Is C < 10 ?</div></div>
                            </div>
                            <div class="border-b-2 border-r-2 border-t-2 border-gray-400 w-12 h-[18rem] -mt-[2rem] ml-2 rounded-r-lg"><div class="w-full text-center text-xs font-bold text-green-600 mt-2 bg-white">Yes</div></div>
                        </div>
                        <div class="flex flex-col items-center my-1"><div class="w-0.5 h-6 bg-gray-400"></div><i data-lucide="arrow-down" class="text-gray-400 w-4 h-4 -mt-1"></i></div>
                        <span class="text-xs font-bold text-red-600 ml-16 -mt-6 bg-white px-1">No</span>
                        <div class="mx-auto w-52 flex justify-center relative"><div class="flex items-center justify-center text-center font-bold text-sm md:text-base border-2 shadow-sm px-4 py-2 w-48 bg-blue-50 border-blue-300 text-blue-800 transform skew-x-[-15deg]"><span class="transform skew-x-[15deg] block">Print Prod</span></div></div>
                        <div class="flex flex-col items-center my-1"><div class="w-0.5 h-6 bg-gray-400"></div><i data-lucide="arrow-down" class="text-gray-400 w-4 h-4 -mt-1"></i></div>
                        <div class="flex items-center justify-center text-center font-bold text-sm md:text-base border-2 shadow-sm px-4 py-2 w-48 rounded-full bg-red-50 border-red-300 text-red-800">Stop</div>
                    </div>`
            }
        ];

        // --- حالة التطبيق ---
        let currentLang = 'ar';
        let openQuestionId = null;

        // --- الدوال الرئيسية ---

        function toggleQuestion(id) {
            openQuestionId = openQuestionId === id ? null : id;
            renderQuestions();
        }

        function setLanguage(lang) {
            currentLang = lang;
            
            // تحديث واجهة المستخدم العامة
            const isAr = lang === 'ar';
            document.getElementById('html-root').setAttribute('dir', isAr ? 'rtl' : 'ltr');
            document.getElementById('html-root').setAttribute('lang', lang);
            
            document.getElementById('main-title').innerText = isAr ? 'حلول واجب سيف علي' : 'Saif Ali Assignment';
            document.getElementById('sub-title').innerHTML = `<i data-lucide="user-check" class="w-4 h-4"></i> ${isAr ? 'جاهز للشرح الشفوي والمناقشة' : 'Ready for Verbal Explanation'}`;
            
            document.getElementById('tip-title').innerText = isAr ? 'نصيحة ذهبية' : 'Golden Tip';
            document.getElementById('tip-body').innerText = isAr ? 
                "الأساتذة يركزون على الفهم أكثر من الحفظ. افتح كل سؤال واقرأ (شلون تشرحها للأستاذ)، هذا المربع الأصفر هو السر اللي راح يخليك تجاوب بثقة وتاخذ درجة كاملة." : 
                "Professors value understanding over memorization. Make sure to read the explanation part so you can confidently answer any oral questions.";

            // تحديث شكل الأزرار
            const btnAr = document.getElementById('btn-ar');
            const btnEn = document.getElementById('btn-en');
            
            if (isAr) {
                btnAr.className = "flex items-center gap-2 px-3 md:px-4 py-2 rounded-md font-bold transition-all text-sm bg-yellow-500 text-gray-900 shadow-sm";
                btnEn.className = "flex items-center gap-2 px-3 md:px-4 py-2 rounded-md font-bold transition-all text-sm text-gray-400 hover:text-white";
            } else {
                btnEn.className = "flex items-center gap-2 px-3 md:px-4 py-2 rounded-md font-bold transition-all text-sm bg-white text-gray-900 shadow-sm";
                btnAr.className = "flex items-center gap-2 px-3 md:px-4 py-2 rounded-md font-bold transition-all text-sm text-gray-400 hover:text-white";
            }

            // تحديث عنوان الطباعة المخفي
            document.body.setAttribute('data-print-title', isAr ? 'حلول واجب سيف علي - برمجة C++' : 'Saif Ali Assignment - C++ Programming');

            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            const isAr = currentLang === 'ar';

            assignmentData.forEach(item => {
                const isOpen = openQuestionId === item.id;
                
                // بناء هيكل السؤال
                const questionDiv = document.createElement('div');
                questionDiv.className = "bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden transition-all duration-300 print-shadow-none print-mb-8";
                
                // رأس السؤال (للنقر)
                const headerHtml = `
                    <button onclick="toggleQuestion('${item.id}')" class="w-full px-6 py-5 flex items-center justify-between text-left hover:bg-gray-50 transition-colors print-hidden" dir="auto">
                        <h2 class="text-lg md:text-xl font-bold text-gray-800 pr-4">${isAr ? item.q_ar : item.q_en}</h2>
                        <i data-lucide="${isOpen ? 'chevron-up' : 'chevron-down'}" class="w-6 h-6 ${isOpen ? 'text-yellow-600' : 'text-gray-400'} shrink-0"></i>
                    </button>
                    <!-- عنوان للطباعة فقط -->
                    <div class="hidden print-block w-full px-6 py-5 bg-gray-50 border-b border-gray-200" dir="auto">
                        <h2 class="text-lg md:text-xl font-bold text-gray-800">${isAr ? item.q_ar : item.q_en}</h2>
                    </div>
                `;

                // محتوى الإجابة
                let answerHtml = '';
                if (!item.isAlgo) {
                    answerHtml = `
                        <div class="bg-gray-50 border-l-4 border-gray-800 p-5 rounded-r-lg">
                            <div class="flex items-center gap-2 mb-3">
                                <i data-lucide="check-circle-2" class="w-5 h-5 text-gray-800"></i>
                                <h4 class="font-bold text-gray-800 uppercase text-sm tracking-wider">${isAr ? 'الجواب الرسمي (للامتحان)' : 'Formal Answer'}</h4>
                            </div>
                            <p class="text-gray-700 text-lg leading-loose whitespace-pre-wrap font-medium">${isAr ? item.ans_ar : item.ans_en}</p>
                        </div>
                    `;
                } else {
                    answerHtml = `
                        <div class="flex flex-col md:flex-row gap-6">
                            <!-- Algorithm Section -->
                            <div class="flex-1 bg-slate-800 text-green-400 p-6 rounded-xl font-mono shadow-inner border border-slate-700">
                                <h4 class="font-bold text-white uppercase text-sm mb-4 pb-2 border-b border-slate-600 flex items-center gap-2">
                                    <i data-lucide="code" class="w-4 h-4"></i>
                                    ${isAr ? 'الخوارزمية (Algorithm)' : 'Algorithm'}
                                </h4>
                                <pre class="whitespace-pre-wrap text-base md:text-lg leading-relaxed">${isAr ? item.algo_ar : item.algo_en}</pre>
                            </div>
                            
                            <!-- Flowchart Section -->
                            <div class="flex-1 bg-white border-2 border-gray-200 p-6 rounded-xl flex flex-col items-center shadow-sm">
                                <h4 class="font-bold text-gray-800 uppercase text-sm mb-6 pb-2 border-b-2 border-gray-200 w-full text-center">
                                    ${isAr ? 'المخطط الانسيابي (Flowchart)' : 'Flowchart'}
                                </h4>
                                <div class="transform scale-90 md:scale-100 origin-top">
                                    ${item.flowchartHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }

                // مربع شرح الأستاذ
                const explanationHtml = `
                    <div class="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-6 relative shadow-sm mt-8">
                        <div class="absolute -top-4 right-6 bg-yellow-400 text-yellow-900 text-sm font-bold px-4 py-1.5 rounded-full shadow-md flex items-center gap-2">
                            <i data-lucide="lightbulb" class="w-4 h-4"></i>
                            شلون تشرحها للأستاذ؟ (مهم)
                        </div>
                        <p class="text-yellow-900 font-bold mt-3 font-serif text-lg leading-relaxed dir-rtl text-right" dir="rtl">
                            "${item.explanation}"
                        </p>
                    </div>
                `;

                // تجميع كل الأجزاء
                questionDiv.innerHTML = `
                    ${headerHtml}
                    <div class="accordion-content print-expand ${isOpen ? 'open' : ''}">
                        <div class="p-6 space-y-8">
                            ${answerHtml}
                            ${explanationHtml}
                        </div>
                    </div>
                `;

                container.appendChild(questionDiv);
            });

            // إعادة تفعيل أيقونات Lucide بعد تحديث الـ DOM
            lucide.createIcons();
        }

        // --- تصدير لملف Word ---
        function exportWord() {
            const isAr = currentLang === 'ar';
            const dir = isAr ? 'rtl' : 'ltr';
            const align = isAr ? 'right' : 'left';
            
            let html = `<html dir="${dir}" lang="${currentLang}">
            <head>
            <meta charset="utf-8">
            <style>
                body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: ${align}; padding: 20px; color: #000; }
                h1 { color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 10px; text-align: center; }
                h2 { color: #1f2937; margin-top: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 5px; }
                h4 { color: #047857; margin-top: 15px; }
                .ans { background-color: #f9fafb; padding: 15px; border: 1px solid #e5e7eb; border-radius: 5px; font-size: 14pt; font-weight: bold; white-space: pre-wrap; }
                .algo { font-family: monospace; background-color: #1e293b; color: #4ade80; padding: 15px; border-radius: 5px; font-size: 14pt; white-space: pre-wrap; }
                .tip { background-color: #fef3c7; color: #92400e; padding: 15px; border: 1px solid #fde68a; border-radius: 5px; font-size: 14pt; font-weight: bold; }
            </style>
            </head>
            <body>
            <h1>${isAr ? 'حلول واجب سيف علي' : 'Saif Ali Assignment'}</h1>
            `;

            assignmentData.forEach(item => {
                html += `<h2>${isAr ? item.q_ar : item.q_en}</h2>`;
                if (!item.isAlgo) {
                    html += `<h4>${isAr ? 'الجواب الرسمي:' : 'Formal Answer:'}</h4>`;
                    html += `<div class="ans">${isAr ? item.ans_ar : item.ans_en}</div>`;
                } else {
                    html += `<h4>${isAr ? 'الخوارزمية (Algorithm):' : 'Algorithm:'}</h4>`;
                    html += `<div class="algo">${isAr ? item.algo_ar : item.algo_en}</div>`;
                    html += `<p style="color: #6b7280; font-style: italic;">${isAr ? '(ملاحظة: المخطط الانسيابي Flowchart لا يظهر في ملف الوورد، يرجى طباعة PDF لرؤيته)' : '(Note: Flowchart is not visible in Word export)'}</p>`;
                }
                html += `<h4>${isAr ? 'شلون تشرحها للأستاذ؟' : 'Explanation for Professor:'}</h4>`;
                html += `<div class="tip">${item.explanation}</div>`;
            });

            html += `</body></html>`;

            // تكوين الملف وتحميله
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Saif_Ali_Assignment_${currentLang}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // التهيئة الأولى عند تحميل الصفحة
        window.onload = () => {
            renderQuestions();
            lucide.createIcons();
        };
    </script>
</body>
</html>
